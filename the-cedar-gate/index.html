<style>
  :root{ --bg:#0E0A04; --accent:#C98F23; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; }
  body{ background:var(--bg); overflow:hidden; font-family:Inter,-apple-system,system-ui,sans-serif; }
  .deck{ height:100dvh; overflow-y:auto; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; scroll-behavior:smooth; }
  .slide{ position:relative; min-height:100dvh; scroll-snap-align:start; scroll-snap-stop:always;
           display:flex; align-items:center; justify-content:center; padding:min(4vh,40px) min(4vw,48px); }
  .slide img{ width:min(1440px,96vw); height:auto; max-height:92dvh; object-fit:contain;
               border-radius:7px; box-shadow:0 40px 100px -45px rgba(0,0,0,.75); }
  /* subtle download button (fixed, glass; accent on hover) */
  .dl{ position:fixed; top:16px; right:16px; z-index:30; display:inline-flex; align-items:center; gap:7px;
        padding:8px 14px 8px 12px; border-radius:999px; text-decoration:none;
        font-size:11px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase;
        color:rgba(255,255,255,.72); background:rgba(255,255,255,.07);
        border:1px solid rgba(255,255,255,.14); -webkit-backdrop-filter:blur(7px); backdrop-filter:blur(7px);
        transition:color .2s, background .2s, border-color .2s; }
  .dl svg{ width:13px; height:13px; }
  .dl:hover{ color:#0E0A04; background:var(--accent); border-color:var(--accent); }
  @media (max-width:520px){ .dl{ top:12px; right:12px; padding:7px 12px 7px 10px; font-size:10px; } }
  /* scroll affordance — inside slide 1, scrolls away (no JS) */
  .cue{ position:absolute; left:50%; bottom:20px; transform:translateX(-50%);
         color:var(--accent); font-size:24px; line-height:1; opacity:.85; animation:bob 1.9s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{ transform:translate(-50%,0); } 50%{ transform:translate(-50%,7px); } }
  @media print{ .cue,.dl{ display:none; } .deck{ overflow:visible; height:auto; } }
</style></head>
